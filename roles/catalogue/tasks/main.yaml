- name: enable nodejs 20
    command: "dnf module enable nodejs:20 -y"

- name: install nodejs 20
  package: 
    name: nodejs
    state: present

- name: create roboshop system user 
  user:
    name: roboshop
    system: true
    home: /app
    shell : /sbin/nologin
    comment: "roboshop system user"

- name: remove app directory
  file:
    path: /app
    state: absent

- name: delete catalogue.zip in tmp directory
  file:
    path: /tmp/catalogue.zip
    state: absent

- name: create app directory
  file:
    path: /app
    state: directory

- name: download catalogue
  get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
    dest: /tmp/catalogue.zip 

- name: unzip catalogue
  unarchive:
    src: /tmp/catalogue.zip
    dest: /app
    remote_src: yes

- name: npm install dependencies
  community.general.npm:
    path: /app

- name: copy catalogue service
  template:
    src: catalogue.service.j2
    dest: /etc/systemd/system/catalogue.service

- name: copy mongodb repo file
  copy:
    src: mongo.repo  #src means mongo.repo file should be in the same location where this playbook is present # src means source file
    dest: /etc/yum.repos.d/mongo.repo # dest means destination file. This is the location where the mongo.repo file will be copied to on the target machine.

- name: install mongodb server
  package:
    name: mongodb-mongosh
    state: present

- name: check catalogue scheme exist or not
  shell: mongosh --host "{{ MONGODB_HOST }}" --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output
  
- name: print catalogue output
  debug:
    msg: "{{ catalogue_output}}"
  
  
- name: load products 
  shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
  when: catalogue_output.stdout | int < 0  #stdout stands for Standard Output. # | pipe to convert srting to int and then compare to stdout 
  

- name: demon reload catalogue
  systemd_service:
    name: catalogue
    daemon_reload: true
  
- name: enable and start catalogue
  service:
    name: catalogue
    state: restarted
    enabled: yes
